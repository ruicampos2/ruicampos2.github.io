				function position(pos, x, y, z){
					pos.position.x = x;
					pos.position.y = y;
					pos.position.z = z;
				}

					step += 0.01;
					// Bounce the sphere up and down

					//movimento bola e jogadores 1º canto
					sphere.position.z = 20 + (40 * Math.cos(step));
					sphere.position.x = -90 + (-10 * Math.cos(step));
					sphere.position.y = 0.5 + (10 * Math.abs(Math.sin(step)));

					position(DCD, -10, 2.5, 10);
					position(DC, -75, 2.5, -25);
					position(DCE, -75, 2.5, -20);

					position(MCE, -75, 2.5, -15);

					position(MCO, -80, 2.5, 0);
					position(PLD, -80, 2.5, 5 );
					position(PLE, -90, 2.5, 45);

					LE.position.z = 40 + (-2 * Math.cos(step));
					LE.position.x = -30 + (10 * Math.cos(step));
					LE.position.y = 2.5;

					MCE.position.z = -15 + (-2 * Math.cos(step));
					MCE.position.x = -75 + (5 * Math.cos(step));
					MCE.position.y = 2.5;

					DCE.position.z = -20 + (-2 * Math.cos(step));
					DCE.position.x = -75 + (5 * Math.cos(step));
					DCE.position.y = 2.5;

					DC.position.z = -25 + (-2 * Math.cos(step));
					DC.position.x = -75 + (5 * Math.cos(step));
					DC.position.y = 2.5;
			
					PLD.position.z = 5 + (-2 * Math.cos(step));
					PLD.position.x = -80 + (5 * Math.cos(step));
					PLD.position.y = 2.5;

					MCO.position.z = 0 + (-2 * Math.cos(step));
					MCO.position.x = -80 + (5 * Math.cos(step));
					MCO.position.y = 2.5;

					//---------------------------------------------------------

					// Render using requestAnimationFrame 
					requestAnimationFrame(cantof);
					renderer.render(scene, camera);
					
				}
